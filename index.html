<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0c4a6e">
<link rel="manifest" href="./manifest.json">
<title>محطة المياه</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#f8fafc;max-width:440px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;overflow-x:hidden}

/* Header */
.hdr{background:linear-gradient(135deg,#0c4a6e,#0284c7);padding:12px 16px;display:flex;align-items:center;gap:8px;color:#fff}
.hdr-t{flex:1;font-size:18px;font-weight:800}
.hdr-s{font-size:18px;background:rgba(255,255,255,.2);border-radius:20px;padding:4px 10px}

/* Tabs */
.tabs{display:flex;background:#fff;border-bottom:1px solid #e2e8f0}
.tab{flex:1;padding:10px 0;background:none;border:none;border-bottom:3px solid transparent;font-size:13px;font-family:inherit;cursor:pointer;color:#94a3b8;transition:.15s}
.tab.on{border-bottom-color:#0c4a6e;color:#0c4a6e;font-weight:800}

/* Flash */
.flash{text-align:center;padding:10px;font-size:16px;font-weight:800;animation:flashIn .3s}
@keyframes flashIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}

/* Entry page */
.entry{flex:1;display:flex;flex-direction:column;padding:0 10px 10px}
.monthly-tog{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;cursor:pointer;align-self:flex-start;margin:10px 0 0;border:2px solid #e2e8f0;background:transparent;font-family:inherit;font-size:12px;color:#94a3b8}
.monthly-tog.on{background:#fef3c7;border-color:#f59e0b;color:#92400e;font-weight:700}

.display{text-align:center;padding:16px 0 6px}
.disp-num{font-size:46px;font-weight:800;color:#0f172a;font-family:monospace;letter-spacing:2px;min-height:54px;line-height:1}
.disp-lbl{font-size:13px;color:#94a3b8;margin-top:2px}
.preview{display:inline-block;margin:6px auto 0;padding:3px 14px;border-radius:8px;font-size:14px;font-weight:700}
.preview.match{background:#dcfce7;color:#16a34a}
.preview.est{background:#f0f9ff;color:#0369a1}

.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:0 4px;margin-bottom:12px}
.nbtn{padding:14px;font-size:22px;font-weight:700;background:#fff;border:1px solid #e2e8f0;border-radius:10px;cursor:pointer;color:#0f172a;font-family:inherit}
.nbtn.del{font-size:18px;background:#f1f5f9;color:#64748b}
.nbtn:active{transform:scale(.95);background:#f1f5f9}

.actions{display:flex;gap:8px;padding:0 4px;margin-bottom:8px}
.act{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:13px 4px;border:2.5px solid;border-radius:12px;cursor:pointer;transition:.15s;font-family:inherit;background:#f1f5f9}
.act .ico{font-size:20px}
.act .lbl{font-size:14px;font-weight:800}
.act:active{transform:scale(.96)}
.act[disabled]{opacity:.4;pointer-events:none}

.act.cash{background:#dcfce7;border-color:#16a34a}.act.cash .lbl{color:#16a34a}
.act.debt{background:#fef3c7;border-color:#d97706}.act.debt .lbl{color:#d97706}
.act.payback{background:#dbeafe;border-color:#2563eb}.act.payback .lbl{color:#2563eb}
.act.off{background:#f1f5f9;border-color:#e2e8f0}.act.off .lbl{color:#94a3b8}

.mini-bar{display:flex;justify-content:space-around;padding:8px 0;font-size:12px;color:#16a34a;border-top:1px solid #e2e8f0}
.mini-bar span:last-child{font-weight:800}

/* Reports */
.report{padding:12px 12px 24px;overflow-y:auto;flex:1}
.sec{font-size:16px;font-weight:800;color:#0f172a;margin-bottom:10px}
.sec.mt{margin-top:20px}

.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
.ms{background:#fff;border-radius:10px;padding:10px 6px;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.ms-n{font-size:20px;font-weight:800;color:#0f172a}
.ms-l{font-size:10px;color:#64748b;margin-top:2px}

.mbox{background:#fef3c7;border-radius:10px;padding:12px;border:2px solid #f59e0b}
.mbox-r{display:flex;justify-content:space-between;padding:6px 0;font-size:14px;color:#92400e}

.debt-t{padding:14px;border-radius:10px;text-align:center;font-size:18px;font-weight:800}

.erow{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#fff;border-radius:8px;margin-bottom:5px;box-shadow:0 1px 2px rgba(0,0,0,.04);font-size:13px}
.erow-type{flex:1;font-weight:600}
.erow-amt{font-weight:800;min-width:55px;text-align:left}
.erow-time{font-size:10px;color:#94a3b8}

.empty{text-align:center;padding:28px;color:#94a3b8;font-size:14px}

/* Monthly table */
.thdr{display:flex;padding:8px 10px;font-size:11px;font-weight:700;color:#64748b;border-bottom:2px solid #e2e8f0}
.trow{display:flex;padding:10px;font-size:13px;border-bottom:1px solid #f1f5f9;align-items:center}
.trow.cur{background:#f0f9ff}
.ytot{display:flex;padding:10px;font-size:13px;font-weight:800;background:#f0f9ff;border-radius:0 0 10px 10px;border-top:2px solid #0c4a6e;color:#0c4a6e}
.tc{flex:1;text-align:center}.tw{flex:2}
</style>
</head>
<body>

<div class="hdr">
  <span style="font-size:24px">💧</span>
  <span class="hdr-t">محطة المياه</span>
  <div class="hdr-s" id="season-badge"></div>
</div>

<div class="tabs">
  <button class="tab on" data-tab="entry">💧 تعبئة</button>
  <button class="tab" data-tab="summary">📊 التقارير</button>
  <button class="tab" data-tab="monthly">📅 الأشهر</button>
</div>

<div id="flash-area"></div>
<div id="page-entry" class="entry"></div>
<div id="page-summary" class="report" style="display:none"></div>
<div id="page-monthly" class="report" style="display:none"></div>

<script>
// ===== DATA =====
const WINTER={2:3,3:4,4:5,5:6,6:8,8:10,10:12,12:16};
const MONTHS=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const TYPES={cash:{ar:'نقد',color:'#16a34a',bg:'#dcfce7',icon:'💵'},debt:{ar:'آجل',color:'#d97706',bg:'#fef3c7',icon:'📝'},payback:{ar:'تسديد',color:'#2563eb',bg:'#dbeafe',icon:'🔄'}};

let entries=JSON.parse(localStorage.getItem('water-v2')||'[]');
let amount='';
let isMonthly=false;
let currentTab='entry';

function getSeason(){const m=new Date().getMonth();return m>=4&&m<=9?'summer':'winter'}
function getMeters(amt,type){
  if(type==='payback')return 0;
  if(getSeason()==='summer')return amt;
  if(WINTER[amt]!==undefined)return WINTER[amt];
  return Math.round(amt/0.8*10)/10;
}
function save(){localStorage.setItem('water-v2',JSON.stringify(entries))}
function todayStr(){return new Date().toDateString()}
function filterDay(arr){const t=todayStr();return arr.filter(e=>new Date(e.ts).toDateString()===t)}
function filterMonth(arr,m,y){return arr.filter(e=>{const d=new Date(e.ts);return d.getMonth()===m&&d.getFullYear()===y})}
function calc(arr){return{
  fills:arr.filter(e=>e.type!=='payback').length,
  meters:arr.filter(e=>e.type!=='payback').reduce((s,e)=>s+e.meters,0),
  cash:arr.filter(e=>e.type==='cash').reduce((s,e)=>s+e.amount,0),
  debt:arr.filter(e=>e.type==='debt').reduce((s,e)=>s+e.amount,0),
  payback:arr.filter(e=>e.type==='payback').reduce((s,e)=>s+e.amount,0),
  monthlyFills:arr.filter(e=>e.monthly&&e.type!=='payback').length
}}

// ===== TABS =====
document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    currentTab=btn.dataset.tab;
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    document.getElementById('page-entry').style.display=currentTab==='entry'?'flex':'none';
    document.getElementById('page-summary').style.display=currentTab==='summary'?'block':'none';
    document.getElementById('page-monthly').style.display=currentTab==='monthly'?'block':'none';
    if(currentTab!=='entry')renderReport();
  });
});

// ===== ENTRY PAGE =====
function renderEntry(){
  const season=getSeason();
  document.getElementById('season-badge').textContent=season==='summer'?'☀️':'❄️';

  const amt=parseFloat(amount);
  const hasAmt=amt>0;
  let previewHtml='';
  if(hasAmt){
    const m3=getMeters(amt,'cash');
    const match=season==='winter'&&WINTER[amt]!==undefined;
    previewHtml=`<div class="preview ${match?'match':'est'}">≈ ${m3} م³</div>`;
  }

  const todayE=filterDay(entries);
  const ts=calc(todayE);

  document.getElementById('page-entry').innerHTML=`
    <button class="monthly-tog ${isMonthly?'on':''}" id="mtog">
      <span>${isMonthly?'⭐':'☆'}</span> أبو هويمل
    </button>
    <div class="display">
      <div class="disp-num">${amount||'0'}</div>
      <div class="disp-lbl">دينار</div>
      ${previewHtml}
    </div>
    <div class="numpad">
      ${['1','2','3','4','5','6','7','8','9','.','0','⌫'].map(n=>
        `<button class="nbtn ${n==='⌫'?'del':''}" data-n="${n}">${n}</button>`
      ).join('')}
    </div>
    <div class="actions">
      ${['cash','debt','payback'].map(t=>{
        const i=TYPES[t];
        return`<button class="act ${hasAmt?t:'off'}" data-type="${t}" ${hasAmt?'':'disabled'}>
          <span class="ico">${i.icon}</span>
          <span class="lbl">${i.ar}</span>
        </button>`;
      }).join('')}
    </div>
    <div class="mini-bar">
      <span>💵 ${ts.cash.toFixed(1)}</span>
      <span style="color:#d97706">📝 ${ts.debt.toFixed(1)}</span>
      <span style="color:#2563eb">🔄 ${ts.payback.toFixed(1)}</span>
      <span>💰 ${(ts.cash+ts.payback).toFixed(1)}</span>
    </div>`;

  // Events
  document.getElementById('mtog').addEventListener('click',()=>{isMonthly=!isMonthly;renderEntry()});
  document.querySelectorAll('.nbtn').forEach(b=>b.addEventListener('click',()=>{
    const n=b.dataset.n;
    if(n==='.'&&amount.includes('.'))return;
    if(n==='⌫'){amount=amount.slice(0,-1)}else{amount+=n}
    renderEntry();
  }));
  document.querySelectorAll('.act').forEach(b=>b.addEventListener('click',()=>{
    const type=b.dataset.type;
    const num=parseFloat(amount);
    if(!num||num<=0)return;
    entries.unshift({id:Date.now(),type,amount:num,meters:getMeters(num,type),ts:new Date().toISOString(),monthly:isMonthly,season});
    save();
    showFlash(type);
    amount='';isMonthly=false;
    renderEntry();
  }));
}

function showFlash(type){
  const i=TYPES[type];
  const el=document.getElementById('flash-area');
  el.innerHTML=`<div class="flash" style="background:${i.bg};color:${i.color}">✓ تم — ${i.ar}</div>`;
  setTimeout(()=>{el.innerHTML=''},1200);
}

// ===== REPORTS =====
function renderReport(){
  const now=new Date();
  const thisM=now.getMonth(), thisY=now.getFullYear();
  const todayE=filterDay(entries);
  const monthE=filterMonth(entries,thisM,thisY);
  const ts=calc(todayE), ms=calc(monthE);
  const totalDebt=entries.filter(e=>e.type==='debt'&&!e.monthly).reduce((s,e)=>s+e.amount,0);
  const totalPB=entries.filter(e=>e.type==='payback').reduce((s,e)=>s+e.amount,0);
  const outstanding=Math.max(0,totalDebt-totalPB);

  document.getElementById('page-summary').innerHTML=`
    <div class="sec">⏱️ اليوم</div>
    <div class="g3">
      <div class="ms"><div class="ms-n">${ts.fills}</div><div class="ms-l">تعبئة</div></div>
      <div class="ms"><div class="ms-n">${ts.meters.toFixed(1)}</div><div class="ms-l">م³</div></div>
      <div class="ms" style="background:#dcfce7"><div class="ms-n" style="color:#16a34a">${ts.cash.toFixed(1)}</div><div class="ms-l">💵 نقد</div></div>
      <div class="ms" style="background:#fef3c7"><div class="ms-n" style="color:#d97706">${ts.debt.toFixed(1)}</div><div class="ms-l">📝 آجل</div></div>
      <div class="ms" style="background:#dbeafe"><div class="ms-n" style="color:#2563eb">${ts.payback.toFixed(1)}</div><div class="ms-l">🔄 تسديد</div></div>
      <div class="ms" style="border:2px solid #0c4a6e"><div class="ms-n" style="color:#0c4a6e">${(ts.cash+ts.payback).toFixed(1)}</div><div class="ms-l">💰 صندوق</div></div>
    </div>

    <div class="sec mt">📅 ${MONTHS[thisM]}</div>
    <div class="g3">
      <div class="ms"><div class="ms-n">${ms.fills}</div><div class="ms-l">تعبئة</div></div>
      <div class="ms"><div class="ms-n">${ms.meters.toFixed(0)}</div><div class="ms-l">م³</div></div>
      <div class="ms" style="background:#dcfce7"><div class="ms-n" style="color:#16a34a">${ms.cash.toFixed(1)}</div><div class="ms-l">نقد</div></div>
      <div class="ms" style="background:#fef3c7"><div class="ms-n" style="color:#d97706">${ms.debt.toFixed(1)}</div><div class="ms-l">آجل</div></div>
      <div class="ms"><div class="ms-n">${(ms.cash+ms.debt).toFixed(1)}</div><div class="ms-l">المجموع</div></div>
      <div class="ms"><div class="ms-n">${ms.payback.toFixed(1)}</div><div class="ms-l">تسديدات</div></div>
    </div>

    <div class="sec mt">⭐ أبو هويمل — شهري</div>
    <div class="mbox">
      <div class="mbox-r"><span>تعبئات هذا الشهر</span><strong>${ms.monthlyFills}</strong></div>
      <div class="mbox-r"><span>المبلغ المستحق</span><strong>${ms.monthlyFills*10} د.أ</strong></div>
    </div>

    <div class="sec mt">📋 إجمالي الديون</div>
    <div class="debt-t" style="background:${outstanding>0?'#fef2f2':'#dcfce7'};color:${outstanding>0?'#dc2626':'#16a34a'}">
      ${outstanding>0?outstanding.toFixed(1)+' د.أ باقي':'لا يوجد ديون 🎉'}
    </div>

    <div class="sec mt">آخر العمليات</div>
    ${todayE.length===0?'<div class="empty">لا يوجد عمليات اليوم</div>':''}
    ${todayE.slice(0,20).map(e=>{const i=TYPES[e.type];return`
      <div class="erow">
        <span>${i.icon}</span>
        <span class="erow-type" style="color:${i.color}">${i.ar}${e.monthly?' ⭐':''}</span>
        ${e.type!=='payback'?`<span style="font-size:12px;color:#64748b">${e.meters} م³</span>`:''}
        <span class="erow-amt">${e.amount} د.أ</span>
        <span class="erow-time">${new Date(e.ts).toLocaleTimeString('ar-JO',{hour:'2-digit',minute:'2-digit'})}</span>
      </div>`}).join('')}`;

  // Monthly tab
  const thisYear=thisY;
  const months=Array.from({length:12},(_,i)=>{const me=filterMonth(entries,i,thisYear);return{month:i,...calc(me)}}).filter(m=>m.fills>0||m.payback>0);
  const yFills=months.reduce((s,m)=>s+m.fills,0);
  const yM3=months.reduce((s,m)=>s+m.meters,0);
  const yCash=months.reduce((s,m)=>s+m.cash,0);
  const yDebt=months.reduce((s,m)=>s+m.debt,0);
  const yTotal=yCash+yDebt;

  document.getElementById('page-monthly').innerHTML=`
    <div class="sec">📅 تقرير ${thisYear}</div>
    ${months.length===0?'<div class="empty">لا يوجد بيانات بعد</div>':''}
    ${months.length>0?`
      <div class="thdr">
        <span class="tw">الشهر</span><span class="tc">تعبئة</span><span class="tc">م³</span><span class="tc">نقد</span><span class="tc">آجل</span><span class="tc">مجموع</span>
      </div>
      ${months.map(m=>`
        <div class="trow ${m.month===thisM?'cur':''}">
          <span class="tw" style="font-weight:700">${MONTHS[m.month]}</span>
          <span class="tc">${m.fills}</span>
          <span class="tc">${m.meters.toFixed(0)}</span>
          <span class="tc" style="color:#16a34a">${m.cash.toFixed(0)}</span>
          <span class="tc" style="color:#d97706">${m.debt.toFixed(0)}</span>
          <span class="tc" style="font-weight:700">${(m.cash+m.debt).toFixed(0)}</span>
        </div>`).join('')}
      <div class="ytot">
        <span class="tw">الإجمالي</span>
        <span class="tc">${yFills}</span><span class="tc">${yM3.toFixed(0)}</span>
        <span class="tc" style="color:#16a34a">${yCash.toFixed(0)}</span>
        <span class="tc" style="color:#d97706">${yDebt.toFixed(0)}</span>
        <span class="tc">${yTotal.toFixed(0)}</span>
      </div>`:''}`;
}

// ===== INIT =====
renderEntry();
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}
</script>
</body>
</html>
